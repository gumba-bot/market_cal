<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>굼바의 장바구니</title>
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#4F46E5" />
    <link rel="apple-touch-icon" href="favicon.png" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-container">
      <div class="sticky-top">
        <header class="header">
          <h1>굼바의 장바구니</h1>
          <div class="header-buttons">
            <button class="install-btn" style="display: none;">앱 설치 ⬇️</button>
            <button class="clear-btn">모두 삭제</button>
          </div>
        </header>

        <!-- Header Row (Totals) -->
        <div class="table-header total-row">
          <div class="col">
            <span class="label">총 품목 수</span>
            <span class="value count-value">0개</span>
          </div>
          <div class="col">
            <span class="label">총 합계</span>
            <span class="value price-value">0원</span>
          </div>
        </div>
      </div>

      <div class="table-container">
        <!-- Input Rows -->
        <div class="items-list">
          <!-- Rows will be injected here by app.js -->
        </div>
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
